<svg width="100%" viewBox="0 0 680 480" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse" x="140" y="40">
      <path d="M 22 0 L 0 0 0 22" fill="none" stroke="#3A72C9" stroke-width="0.35"/>
    </pattern>
    <clipPath id="cc">
      <circle cx="340" cy="240" r="198"/>
    </clipPath>
    <radialGradient id="vignet" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#0B1D3E" stop-opacity="0"/>
      <stop offset="100%" stop-color="#060F22" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <g id="badge" style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">
    <!-- Outer shadow ring -->
    <circle cx="340" cy="243" r="203" fill="#060F22" opacity="0.3" style="fill:rgb(6, 15, 34);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Main circle fill -->
    <circle cx="340" cy="240" r="200" fill="#0B1D3E" style="fill:rgb(11, 29, 62);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Blueprint grid -->
    <rect x="140" y="40" width="400" height="400" fill="url(#grid)" clip-path="url(#cc)" opacity="0.09" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.09;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Vignette overlay -->
    <circle cx="340" cy="240" r="200" fill="url(#vignet)" clip-path="url(#cc)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Diagonal accent lines (engineering drawing feel) -->
    <line x1="200" y1="90" x2="170" y2="120" stroke="#C9A227" stroke-width="0.6" opacity="0.3" style="fill:rgb(0, 0, 0);stroke:rgb(201, 162, 39);color:rgb(0, 0, 0);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="480" y1="90" x2="510" y2="120" stroke="#C9A227" stroke-width="0.6" opacity="0.3" style="fill:rgb(0, 0, 0);stroke:rgb(201, 162, 39);color:rgb(0, 0, 0);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="200" y1="390" x2="170" y2="360" stroke="#C9A227" stroke-width="0.6" opacity="0.3" style="fill:rgb(0, 0, 0);stroke:rgb(201, 162, 39);color:rgb(0, 0, 0);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="480" y1="390" x2="510" y2="360" stroke="#C9A227" stroke-width="0.6" opacity="0.3" style="fill:rgb(0, 0, 0);stroke:rgb(201, 162, 39);color:rgb(0, 0, 0);stroke-width:0.6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Inner subtle ring -->
    <circle cx="340" cy="240" r="185" fill="none" stroke="#C9A227" stroke-width="0.6" opacity="0.25" stroke-dasharray="3 9" style="fill:none;stroke:rgb(201, 162, 39);color:rgb(0, 0, 0);stroke-width:0.6px;stroke-dasharray:3px, 9px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.25;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Outer gold ring -->
    <circle cx="340" cy="240" r="200" fill="none" stroke="#C9A227" stroke-width="2.8" style="fill:none;stroke:rgb(201, 162, 39);color:rgb(0, 0, 0);stroke-width:2.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Tick marks at N/E/S/W -->
    <line x1="340" y1="38" x2="340" y2="55" stroke="#C9A227" stroke-width="2.2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(201, 162, 39);color:rgb(0, 0, 0);stroke-width:2.2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="542" y1="240" x2="525" y2="240" stroke="#C9A227" stroke-width="2.2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(201, 162, 39);color:rgb(0, 0, 0);stroke-width:2.2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="340" y1="442" x2="340" y2="425" stroke="#C9A227" stroke-width="2.2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(201, 162, 39);color:rgb(0, 0, 0);stroke-width:2.2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="138" y1="240" x2="155" y2="240" stroke="#C9A227" stroke-width="2.2" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgb(201, 162, 39);color:rgb(0, 0, 0);stroke-width:2.2px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Diamonds at tick ends -->
    <polygon points="340,38 344,44 340,50 336,44" fill="#C9A227" style="fill:rgb(201, 162, 39);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <polygon points="542,240 536,244 530,240 536,236" fill="#C9A227" style="fill:rgb(201, 162, 39);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <polygon points="340,442 344,436 340,430 336,436" fill="#C9A227" style="fill:rgb(201, 162, 39);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <polygon points="138,240 144,244 150,240 144,236" fill="#C9A227" style="fill:rgb(201, 162, 39);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Arc accent at top -->
    <path d="M 308 58 Q 340 44 372 58" fill="none" stroke="#C9A227" stroke-width="1.2" opacity="0.5" style="fill:none;stroke:rgb(201, 162, 39);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- The R — white, left-center -->
    <text x="293" y="298" font-size="174" font-weight="700" fill="#FFFFFF" text-anchor="middle" opacity="0.97" style="fill:rgb(255, 255, 255);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.97;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:174px;font-weight:700;text-anchor:middle;dominant-baseline:auto">R</text>

    <!-- The C — gold, right, slightly larger -->
    <text x="400" y="298" font-size="184" font-weight="700" fill="#C9A227" text-anchor="middle" style="fill:rgb(201, 162, 39);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, &quot;Times New Roman&quot;, serif;font-size:184px;font-weight:700;text-anchor:middle;dominant-baseline:auto">C</text>

    <!-- Thin connector line between letters (baseline rule) -->
    <line x1="195" y1="308" x2="488" y2="308" stroke="#C9A227" stroke-width="0.7" opacity="0.35" style="fill:rgb(0, 0, 0);stroke:rgb(201, 162, 39);color:rgb(0, 0, 0);stroke-width:0.7px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Decorative side ornaments on rule -->
    <rect x="195" y="305" width="30" height="6" rx="3" fill="#C9A227" opacity="0.35" style="fill:rgb(201, 162, 39);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <rect x="460" y="305" width="30" height="6" rx="3" fill="#C9A227" opacity="0.35" style="fill:rgb(201, 162, 39);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.35;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Divider with centered diamond -->
    <line x1="220" y1="326" x2="318" y2="326" stroke="#C9A227" stroke-width="0.8" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(201, 162, 39);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <polygon points="340,320 346,326 340,332 334,326" fill="#C9A227" opacity="0.7" style="fill:rgb(201, 162, 39);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.7;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="362" y1="326" x2="460" y2="326" stroke="#C9A227" stroke-width="0.8" opacity="0.5" style="fill:rgb(0, 0, 0);stroke:rgb(201, 162, 39);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- CIVIL ENGINEER -->
    <text x="340" y="368" font-size="13" font-weight="400" fill="#C9A227" text-anchor="middle" opacity="0.75" style="fill:rgb(201, 162, 39);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.75;font-family:Arial, Helvetica, sans-serif;font-size:13px;font-weight:400;text-anchor:middle;dominant-baseline:auto">CIVIL  ENGINEER</text>

    <!-- Bottom arc accent -->
    <path d="M 308 422 Q 340 436 372 422" fill="none" stroke="#C9A227" stroke-width="1.2" opacity="0.5" style="fill:none;stroke:rgb(201, 162, 39);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

    <!-- Small centered emblem mark at top -->
    <circle cx="340" cy="90" r="3" fill="none" stroke="#C9A227" stroke-width="0.8" opacity="0.4" style="fill:none;stroke:rgb(201, 162, 39);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <circle cx="340" cy="90" r="1.2" fill="#C9A227" opacity="0.4" style="fill:rgb(201, 162, 39);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>
</svg>